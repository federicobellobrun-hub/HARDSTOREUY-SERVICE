<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#6e6e73;--line:#e8e8ed;--accent:#0071e3;--dark:#111113;--shadow:0 18px 60px rgba(0,0,0,.08);--radius:24px}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Arial,sans-serif}.app-shell{display:flex;min-height:100vh}.sidebar{width:280px;background:rgba(255,255,255,.78);backdrop-filter:blur(20px);border-right:1px solid var(--line);padding:24px;display:flex;flex-direction:column;gap:28px;position:sticky;top:0;height:100vh}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;object-fit:contain;border-radius:14px}.brand span{display:block;color:var(--muted);font-size:13px;margin-top:3px}nav{display:grid;gap:10px}.nav,.btn,.link-btn{border:0;border-radius:16px;padding:13px 16px;background:#fff;color:var(--text);font-weight:650;text-align:left;cursor:pointer;transition:.18s;box-shadow:0 1px 0 rgba(0,0,0,.04)}.nav:hover,.btn:hover,.link-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,0,0,.08)}.nav.active{background:#1d1d1f;color:#fff}.nav.primary,.btn.primary{background:var(--accent);color:#fff;text-align:center}.link-btn{box-shadow:none;color:var(--accent);background:transparent}.sidebar footer{margin-top:auto;color:var(--muted);font-size:12px}.main{flex:1;padding:34px;max-width:1320px;margin:0 auto;width:100%}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;gap:16px}.top-actions{display:flex;gap:10px}h1{font-size:42px;margin:0;letter-spacing:-.04em}h2{margin:0;font-size:26px;letter-spacing:-.02em}h3{margin:26px 0 12px;font-size:16px}p{margin:0;color:var(--muted)}.eyebrow{text-transform:uppercase;letter-spacing:.12em;font-size:12px;font-weight:750}.view{display:none}.view.active{display:block}.hero{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.grid{display:grid;gap:18px;margin-bottom:24px}.stats-grid{grid-template-columns:repeat(6,minmax(120px,1fr))}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}.stat small{color:var(--muted);font-weight:650}.stat strong{display:block;font-size:38px;letter-spacing:-.04em;margin-top:10px}.toolbar{display:flex;gap:12px;margin:0 0 18px}.input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px 16px;font:inherit;outline:none}.input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,113,227,.12)}.list{display:grid;gap:12px}.order{display:grid;grid-template-columns:150px 1fr 180px 120px 130px;gap:14px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;cursor:pointer}.order:hover{box-shadow:var(--shadow);border-color:#dadade}.order p{margin-top:4px}.pill{border-radius:999px;padding:8px 12px;font-size:13px;font-weight:750;text-align:center;background:#f5f5f7;white-space:nowrap}.pill.Recibido{background:#fff7d6}.pill.Diagnóstico{background:#e8f1ff}.pill.Esperando{background:#fff0df}.pill.Reparando{background:#f0e8ff}.pill.Listo{background:#e8f8ed}.pill.Entregado{background:#eeeeee}.pill.No{background:#ffe8e8}.priority{font-size:12px;color:var(--muted)}.priority.Urgente{color:#b00020;font-weight:800}.priority.Alta{color:#b85c00;font-weight:800}.form-card{max-width:920px}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.full{grid-column:1/-1}.actions{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}.btn{text-align:center}.modal{position:fixed;inset:0;background:rgba(0,0,0,.25);display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal.open{display:flex}.modal-card{background:#fff;border-radius:28px;box-shadow:var(--shadow);padding:24px;max-width:860px;width:100%;max-height:90vh;overflow:auto}.detail-title{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:18px}.timeline{display:grid;gap:10px;margin-top:14px;border-left:2px solid var(--line);padding-left:16px}.timeline-item{position:relative}.timeline-item:before{content:'';position:absolute;left:-22px;top:5px;width:10px;height:10px;background:var(--accent);border-radius:50%}.print-card{display:none}#toast{position:fixed;right:24px;bottom:24px;background:#1d1d1f;color:white;padding:14px 18px;border-radius:14px;opacity:0;transform:translateY(10px);transition:.2s;z-index:20}.show-toast{opacity:1!important;transform:translateY(0)!important}
@media(max-width:1100px){.stats-grid{grid-template-columns:repeat(3,1fr)}.order{grid-template-columns:1fr 1fr}.order small{display:none}}
@media(max-width:800px){.app-shell{display:block}.sidebar{position:relative;width:auto;height:auto}.main{padding:18px}.topbar,.hero{align-items:flex-start;flex-direction:column}.stats-grid{grid-template-columns:repeat(2,1fr)}.order{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}h1{font-size:32px}.toolbar{flex-direction:column}}
@media print{body{background:#fff}.sidebar,.topbar,.view,.modal .actions,#toast{display:none!important}.modal{display:block!important;position:static;background:#fff;padding:0}.modal-card{box-shadow:none;border-radius:0;max-height:none}.print-hide{display:none!important}}
</style>
