<section id="dashboard" class="view active">
  <div class="hero card">
    <div>
      <p class="eyebrow">Panel principal</p>
      <h2>Reparaciones HARDSTOREUY</h2>
      <p>Vista rápida de equipos recibidos, en reparación y listos para retirar.</p>
    </div>
    <button class="btn primary" onclick="showView('new')">Crear orden</button>
  </div>

  <div class="grid stats-grid">
    <div class="card stat"><small>Ingresadas hoy</small><strong id="statHoy">0</strong></div>
    <div class="card stat"><small>Recibidos</small><strong id="statRecibido">0</strong></div>
    <div class="card stat"><small>Reparando</small><strong id="statReparando">0</strong></div>
    <div class="card stat"><small>Esperando repuesto</small><strong id="statEsperando">0</strong></div>
    <div class="card stat"><small>Listos</small><strong id="statListo">0</strong></div>
    <div class="card stat"><small>Entregados</small><strong id="statEntregado">0</strong></div>
  </div>

  <div class="toolbar">
    <input id="searchBox" class="input" placeholder="Buscar cliente, teléfono, equipo, marca, modelo o número de orden..." oninput="searchOrders(this.value)">
    <button class="btn" onclick="document.getElementById('searchBox').value=''; searchOrders('')">Limpiar</button>
  </div>

  <div class="card">
    <div class="section-head"><h2>Últimas reparaciones</h2><button class="link-btn" onclick="showView('orders')">Ver todas</button></div>
    <div id="recentOrders" class="list"></div>
  </div>
</section>
