<section id="orders" class="view">
  <div class="card">
    <div class="section-head"><div><h2>Reparaciones</h2><p>Busca, filtra, edita estados, imprime y abre WhatsApp.</p></div></div>
    <div class="toolbar">
      <input id="ordersSearch" class="input" placeholder="Buscar órdenes..." oninput="searchOrders(this.value,'ordersList',document.getElementById('ordersStatusFilter').value)">
      <select id="ordersStatusFilter" onchange="searchOrders(document.getElementById('ordersSearch').value,'ordersList',this.value)"><option value="">Todos los estados</option></select>
      <button class="btn" onclick="clearOrdersSearch()">Limpiar</button>
    </div>
    <div id="ordersList" class="list"></div>
  </div>
</section>
